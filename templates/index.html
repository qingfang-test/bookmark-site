<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>我的书签</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f6f8fa; margin: 0; padding: 30px; }
    .wrap { max-width: 800px; margin: 0 auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,.06);}
    h1 { margin-top: 0; }
    form { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
    input[name="title"] { width: 180px; }
    input[name="url"] { flex: 1; min-width: 260px; }
    button { padding: 10px 14px; border: 0; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; }
    .delete-btn { background: #dc2626; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { display: flex; justify-content: space-between; align-items: center; gap: 12px; border-top: 1px solid #eee; padding: 14px 0; }
    .meta a { font-size: 18px; color: #111827; text-decoration: none; }
    .meta a:hover { text-decoration: underline; }
    .url { color: #6b7280; font-size: 14px; word-break: break-all; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>我的云书签</h1>

    <form method="post" action="/add">
      <input type="text" name="title" placeholder="标题，例如：GitHub" required>
      <input type="text" name="url" placeholder="网址，例如：https://github.com" required>
      <button type="submit">添加书签</button>
    </form>

    <ul>
      {% for b in bookmarks %}
      <li>
        <div class="meta">
          <a href="{{ b['url'] }}" target="_blank" rel="noopener noreferrer">{{ b['title'] }}</a>
          <div class="url">{{ b['url'] }}</div>
        </div>
        <form method="post" action="/delete/{{ b['id'] }}" style="margin:0;">
          <button class="delete-btn" type="submit">删除</button>
        </form>
      </li>
      {% else %}
      <li>还没有书签，先添加一个试试。</li>
      {% endfor %}
    </ul>
  </div>
</body>
</html>
